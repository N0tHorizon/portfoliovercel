<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon - Resume</title>
  <meta name="description" content="Horizon's Resume" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="pfp-circle.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- marked.js for markdown parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    /* ── TOKENS (identical to index.html) ─────────────── */
    :root {
      --bg:         #ffffff;
      --bg-subtle:  #f6f8fa;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --text-muted: #64748b;
      --text-dim:   #94a3b8;
      --accent:     #3b82f6;
      --nav-bg:     rgba(255,255,255,0.85);
      --nav-border: #e2e8f0;
      --pill-bg:    #f1f5f9;
      --pill-text:  #334155;
      --dot-color:  #cbd5e1;
    }
    [data-theme="dark"] {
      --bg:         #0f1117;
      --bg-subtle:  #161b22;
      --border:     #30363d;
      --text:       #f0f6fc;
      --text-muted: #8b949e;
      --text-dim:   #484f58;
      --accent:     #58a6ff;
      --nav-bg:     rgba(22,27,34,0.85);
      --nav-border: #30363d;
      --pill-bg:    #21262d;
      --pill-text:  #c9d1d9;
      --dot-color:  #30363d;
    }

    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
      padding-bottom: 120px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .container { max-width: 680px; margin: 0 auto; padding: 0 24px; width: 100%; }
    .page-wrap  { flex: 1; }

    /* ── KEYFRAMES ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes navSlideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── TAB SWITCHER ───────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 20px 0 0;
    }
    .tab-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .tab-link:hover {
      background: var(--bg-subtle);
      color: var(--text);
      border-color: var(--border);
    }
    .tab-link.active {
      background: var(--bg-subtle);
      color: var(--text);
      border-color: var(--border);
    }
    .tab-link svg { width: 14px; height: 14px; }

    /* ── PAGE HEADER ────────────────────────────────────── */
    .page-header {
      padding: 32px 0 20px;
      animation: fadeUp 0.5s ease 0.05s both;
    }
    .page-header h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .page-header p {
      font-size: 0.97rem;
      color: var(--text-muted);
    }

    /* ── RESUME CONTENT ─────────────────────────────────── */
    .resume-wrap {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg-subtle);
      padding: 40px 44px;
      animation: fadeUp 0.5s ease 0.15s both;
    }

    /* Markdown rendered styles */
    .resume-content h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
      color: var(--text);
    }
    .resume-content h2 {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 28px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .resume-content h3 {
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--text);
      margin: 16px 0 2px;
    }
    .resume-content h4 {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .resume-content p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .resume-content ul {
      list-style: none;
      padding: 0;
      margin: 4px 0 12px;
    }
    .resume-content ul li {
      font-size: 0.875rem;
      color: var(--text-muted);
      padding: 3px 0 3px 18px;
      position: relative;
      line-height: 1.6;
    }
    .resume-content ul li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }
    .resume-content a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .resume-content a:hover { text-decoration: underline; }
    .resume-content strong { color: var(--text); font-weight: 600; }
    .resume-content em { color: var(--text-dim); font-style: normal; font-size: 0.82rem; }
    .resume-content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.82rem;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--accent);
    }
    .resume-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* Contact line at top */
    .resume-content > p:first-of-type {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    /* ── LOADING / ERROR STATES ─────────────────────────── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 64px 24px;
      text-align: center;
    }
    .state-box .icon { font-size: 2rem; }
    .state-box p { font-size: 0.9rem; color: var(--text-muted); }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ─────────────────────────────────────────── */
    .resume-footer {
      margin-top: 20px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      animation: fadeUp 0.5s ease 0.25s both;
    }
    .resume-footer .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .resume-footer .footer-left strong {
      color: var(--text);
      font-weight: 600;
    }
    .footer-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .footer-note {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── FLOATING NAV ───────────────────────────────────── */
    .floating-nav {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 10px;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 999px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.06);
      z-index: 100;
      animation: navSlideUp 0.5s ease 0.35s both;
    }
    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s, transform 0.2s ease;
      text-decoration: none;
    }
    .nav-btn:hover { background: var(--bg-subtle); color: var(--text); transform: translateY(-2px); }
    .nav-btn:active { transform: translateY(0); }
    .nav-btn svg { width: 18px; height: 18px; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 520px) {
      .resume-wrap { padding: 28px 22px; }
      .resume-footer { flex-direction: column; align-items: flex-start; gap: 6px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<script>
  // ── THEME (identical logic to index.html) ───────────────
  const root   = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const sun    = document.getElementById('iconSun');
  const moon   = document.getElementById('iconMoon');

  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const saved = localStorage.getItem('theme') || (systemDark ? 'dark' : 'light');
  applyTheme(saved);

  toggle.addEventListener('click', () => {
    const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme', next);
  });

  function applyTheme(t) {
    root.dataset.theme = t;
    sun.style.display  = t === 'dark'  ? 'block' : 'none';
    moon.style.display = t === 'light' ? 'block' : 'none';
  }

  // ── LAST UPDATED DATE ───────────────────────────────────
  // Change this string whenever you update your resume.md
  const LAST_UPDATED = "July 2025";
  document.getElementById('lastUpdated').textContent = LAST_UPDATED;

  // ── FETCH & RENDER resume.md ────────────────────────────
  const contentEl = document.getElementById('resumeContent');

  fetch('resume.md')
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    })
    .then(md => {
      // Configure marked for clean output
      marked.setOptions({
        breaks: true,
        gfm: true,
      });
      contentEl.innerHTML = marked.parse(md);
    })
    .catch(err => {
      contentEl.innerHTML = `
        <div class="state-box">
          <span class="icon">📄</span>
          <p>Couldn't load <code>resume.md</code>.<br>Make sure it's in the same folder as this file.</p>
          <p style="font-size:0.78rem;color:var(--text-dim)">${err.message}</p>
        </div>
      `;
    });
</script>
